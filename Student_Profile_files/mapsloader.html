<html lang="en" data-ember-extension="1"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <script>
    var cmpId = "";
    var imageSrc = "https://maps.googleapis.com/maps/api/staticmap?cache=218.0&size=354x199&center=%2367+3RD+CROSS+3RD+PHASE+SAI+CITY+LAYOUT+NR+SAMUEL+SCHOOL+Bangalore+Karnataka+360065+India&maptype=roadmap&format=png&scale=1&zoom=14&markers=color%3Ared%7C%2367+3RD+CROSS+3RD+PHASE+SAI+CITY+LAYOUT+NR+SAMUEL+SCHOOL+Bangalore+Karnataka+360065+India&language=en-US&key=AIzaSyAnsUgPM5XmaLKYqFVfdP1TmuiOzBhtSdA&signature=LxYgNUXEhExAS1HfuiBb2qGHZTU=";
    function showCanvas() {    
        //post the result back to the caller component
        var postMessageEvent = {};    
        postMessageEvent.event = 'lightning:staticMapLoaded';
        postMessageEvent.arguments = {};
                
        //add component id to the data
        postMessageEvent.arguments.cmpId = cmpId;     
        
        window.parent.postMessage(JSON.stringify(postMessageEvent), '*');
        
    }
   
    function onMessageReceived(message) {        
        if (!message || !message.data){
            return;
        } 
        
        var data = JSON.parse(message.data);
        var args = data.arguments;
        
        if (!args){
            return;
        }
        
        cmpId = args.cmpId;
        
        if (!cmpId || cmpId.trim().length === 0){
            return;
        }    
        switch (data.event) {
            case 'loadingMap':
                var image = document.querySelector("#googleImage");
                image.onload = showCanvas;
                image.onerror = function(e) {
                    console.log(e);
                }
                image.src = imageSrc;
                break;
        }
    };
    
    if (window.addEventListener){
        addEventListener("message", onMessageReceived, false);
    } else {
        attachEvent("onmessage", onMessageReceived);
    }           
    
    </script>
</head>

<body style="margin: 0px;overflow:hidden;">
    <img src="./staticmap" alt="Map" width="354" height="199" title="Map" id="googleImage">

</body></html>
