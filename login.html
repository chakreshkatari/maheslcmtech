<!DOCTYPE html>
<html lang="en" dir="ltr" class="slds-no-wcag">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Student Portal - Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 50px 40px;
            text-align: center;
        }

        .login-logo {
            margin-bottom: 30px;
        }

        .login-logo h1 {
            color: #2d2d2d;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .login-logo p {
            color: #666;
            font-size: 14px;
            font-weight: 400;
        }

        .form-wrapper {
            text-align: left;
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f58232;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(245, 130, 50, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            background-color: #fadbd8;
            padding: 12px;
            border-radius: 5px;
            border-left: 4px solid #e74c3c;
        }

        .error-message.show {
            display: block;
        }

        .signin-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f58232 0%, #f5a24b 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .signin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(245, 130, 50, 0.4);
        }

        .signin-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .signin-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f58232;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }

        .loading-text {
            display: inline-block;
            color: #f58232;
            font-size: 14px;
            font-weight: 500;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .security-info {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 40px 25px;
            }

            .login-logo h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-logo">
                <h1>Student Portal</h1>
                <p>Manipal Institute of Technology</p>
            </div>

            <form id="loginForm" class="form-wrapper">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Enter your email" 
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        required
                        autocomplete="current-password"
                    >
                    <div class="error-message" id="errorMessage"></div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <span class="loading-text">Signing in...</span>
                </div>

                <button type="submit" class="signin-btn" id="signinBtn">
                    Sign In
                </button>
            </form>

            <div class="security-info">
                🔒 Your credentials are secure and never stored
            </div>
        </div>
    </div>

    <script>
        // Valid credentials
        const VALID_EMAIL = 'kchakresh.mitblr2025@learner.manipal.edu';
        const VALID_PASSWORD = 'Chakresh1@mit';

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        const signinBtn = document.getElementById('signinBtn');

        // Check if already logged in when page loads
        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = './index.html';
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Reset error message
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';

            // Validate inputs are not empty
            if (!email || !password) {
                errorMessage.textContent = 'Please enter both email and password.';
                errorMessage.classList.add('show');
                return;
            }

            // Show loading state
            loading.style.display = 'block';
            signinBtn.disabled = true;

            // Simulate API call delay
            await new Promise(resolve => setTimeout(resolve, 1000));

            // Validate credentials
            if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                // Credentials are correct
                localStorage.setItem('userEmail', email);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loginTime', new Date().toISOString());

                // Redirect to home page
                window.location.href = './index.html';
            } else {
                // Invalid credentials
                errorMessage.textContent = 'Invalid email or password. Please try again.';
                errorMessage.classList.add('show');
                loading.style.display = 'none';
                signinBtn.disabled = false;
                
                // Clear password field for security
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // Clear error message when user starts typing
        emailInput.addEventListener('input', () => {
            if (errorMessage.classList.contains('show')) {
                errorMessage.classList.remove('show');
            }
        });

        passwordInput.addEventListener('input', () => {
            if (errorMessage.classList.contains('show')) {
                errorMessage.classList.remove('show');
            }
        });
    </script>
</body>
</html>
