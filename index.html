<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 320px; }
        .login-card h2 { text-align: center; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0070f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #005bb5; }
        .error-message { color: red; font-size: 0.85rem; display: none; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>App Login</h2>
        <form id="loginForm">
            <input type="email" id="emailInput" placeholder="Email ID" required>
            <input type="password" id="passwordInput" placeholder="Password" required>
            <button type="submit">Login</button>
            <div id="errorMsg" class="error-message">Invalid email or password.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            // CRITICAL: This stops the browser from sending a POST request to Vercel
            event.preventDefault(); 

            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');

            // Your required credentials
            const validEmail = "kchakresh.mitblr2025@learner.manipal.edu";
            const validPassword = "Chakresh1@mit";

            if (email === validEmail && password === validPassword) {
                // Save a simple flag in the browser to remember the user is logged in
                localStorage.setItem('isAuthenticated', 'true');
                // Redirect to your index page
                window.location.href = 'indexhome.html';
            } else {
                // Show error
                errorMsg.style.display = 'block';
            }
        });
    </script>

</body>
</html>
