<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        /* 1. Background Setup - Updated for reliability */
        body, html {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    /* Anchor to 'left top' so the logo is prioritized */
    background: #2c2c2c url('background.jpg') no-repeat left top fixed; 
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

        /* 2. Transparent Login Card */
        .login-card {
            background-color: rgba(255, 255, 255, 0.75); /* Increased opacity slightly for readability */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
            backdrop-filter: blur(8px); /* Blur effect for that modern glass look */
        }

        .login-card h2 {
            margin-top: 0;
            color: #333;
            font-size: 1.4rem;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #bbb;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .sign-in-btn {
            background-color: #a05a2c; 
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }

        .sign-in-btn:hover {
            background-color: #8a4d25;
        }

        .error-message {
            color: #b00020;
            margin-top: 15px;
            display: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <form id="loginForm">
            <div class="input-group">
                <label for="emailInput">Email ID</label>
                <input type="email" id="emailInput" placeholder="Enter MAHE Email ID" required>
            </div>
            
            <div class="input-group">
                <label for="passwordInput">Password</label>
                <input type="password" id="passwordInput" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="sign-in-btn">Sign in</button>
            <div id="errorMsg" class="error-message">Invalid email or password.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            const validEmail = "kchakresh.mitblr2025@learner.manipal.edu";
            const validPassword = "Chakresh1@mit";

            if (email === validEmail && password === validPassword) {
                localStorage.setItem('isAuthenticated', 'true');
                window.location.href = 'Home.html'; 
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>

</body>
</html>
